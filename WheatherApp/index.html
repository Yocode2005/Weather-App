<!DOCTYPE html> // using html five
<html lang="en"> lamguage used is english
  <head>
    <meta charset="UTF-8" /> // utf 8
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheather App</title> // add titke of the project
    <link rel="stylesheet" href="index.css" /> // add css file to html file
  </head> // head tag
  <body>
    <div class="container">
      <div class="search">
        <input type="text" placeholder="enter the city name" />
        <button><img src="search.png" alt="magnifing glass" /></button>
      </div>
      <div class="error"> 
        <p>Invalid City Name </p>
      </div>
      <div class="weather">
        <img src="rain (2).png" class="weather-icon"  height="250px" width="200px"/>
        <h1 class="temp">22°C</h1>
        <h2 class="city">New York</h2>
      
      <div class="details">
        <div class="col">
          <img src="humidity.png" alt="humidity-picture" />
          <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
          </div>
        </div>
        <div class="col">
          <img src="wind.png" alt="wind-picture"/>
          <div>
            <p class="wind">15 Km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
    <script src="javascript.js"></script> // html file and script file
  </body>
</html>
